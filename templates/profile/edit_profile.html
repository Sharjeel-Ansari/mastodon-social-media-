{% extends 'base.html' %}
{% load static %}
{% block title %}Edit Profile — Mastodon{% endblock %}

{% block content %}
<div style="max-width:600px;border-right:1px solid var(--border);min-height:100vh;background:var(--surface)">

  <div class="feed-header">
    <h2>Edit Profile</h2>
  </div>

  <div style="padding:24px">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="form-section-label">Personal Info</div>
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" name="first_name" class="form-input" value="{{ form.first_name.value|default:'' }}"/>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="last_name" class="form-input" value="{{ form.last_name.value|default:'' }}"/>
        </div>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-input" value="{{ form.username.value|default:'' }}"/>
        {% if form.username.errors %}<span class="form-error">{{ form.username.errors.0 }}</span>{% endif %}
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-input" value="{{ form.email.value|default:'' }}"/>
      </div>

      <div class="form-group">
        <label>Bio</label>
        <textarea name="bio" class="form-input" rows="3" maxlength="300" style="resize:vertical">{{ form.bio.value|default:'' }}</textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Location</label>
          <input type="text" name="location" class="form-input" value="{{ form.location.value|default:'' }}" placeholder="e.g. Karachi, PK"/>
        </div>
        <div class="form-group">
          <label>Website</label>
          <input type="url" name="website" class="form-input" value="{{ form.website.value|default:'' }}" placeholder="https://..."/>
        </div>
      </div>

      <div class="form-section-label">Photos</div>
      <div class="form-row">
        <div class="form-group">
          <label>Profile Photo</label>
          <input type="file" name="avatar" class="form-input" accept="image/*" style="padding:6px"/>
        </div>
        <div class="form-group">
          <label>Cover Photo</label>
          <input type="file" name="cover_photo" class="form-input" accept="image/*" style="padding:6px"/>
        </div>
      </div>

      <div class="form-actions">
        <a href="{% url 'profile' username=request.user.username %}" class="btn-outline">Cancel</a>
        <button type="submit" class="btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
